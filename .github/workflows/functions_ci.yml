name: Functions CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix functions

      - name: Dependency tree (top-level)
        run: npm ls --prefix functions --depth=0
