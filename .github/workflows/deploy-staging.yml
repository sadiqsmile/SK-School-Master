name: Deploy (Staging)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
  FIREBASE_TOOLS_VERSION: ${{ vars.FIREBASE_TOOLS_VERSION || 'latest' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # If you configure GitHub Environments, you can put this behind approvals too.
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project id secret
        run: |
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            echo "Missing secret FIREBASE_PROJECT_ID_STAGING" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ vars.FLUTTER_VERSION || 'stable' }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze & test
        run: |
          flutter analyze
          flutter test

      - name: Build web
        run: flutter build web --release

      # ---- Auth (preferred): Workload Identity Federation (no long-lived key) ----
      - name: Auth (WIF)
        id: auth_wif
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          export_environment_variables: true

      # ---- Auth (fallback): Service account JSON key (less safe) ----
      - name: Auth (JSON key)
        id: auth_key
        if: ${{ (secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || secrets.GCP_SERVICE_ACCOUNT_EMAIL == '') && secrets.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${FIREBASE_TOOLS_VERSION}

      # Safest order: backend first, then hosting.
      - name: Deploy Functions + Firestore rules
        run: firebase deploy --project "${FIREBASE_PROJECT_ID}" --only functions,firestore:rules

      - name: Deploy Hosting
        run: firebase deploy --project "${FIREBASE_PROJECT_ID}" --only hosting
