name: Bug report
description: Report something that isn't working
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Tap...
        3. See...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 1.0.1+2

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs (remove secrets)
